<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>updSH registry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#aaa;font-family:monospace;font-size:14px;line-height:1.5;padding:2rem;max-width:720px;margin:0 auto}
a{color:#fff;text-decoration:underline}
a:hover{color:#fff}
h1{color:#fff;font-size:18px;font-weight:400;margin-bottom:1rem}
h2{color:#fff;font-size:14px;font-weight:400;margin-top:1.5rem;margin-bottom:.5rem}
p{margin-bottom:1rem}
pre{color:#555;margin-bottom:1rem;white-space:pre-wrap}
hr{border:none;border-top:1px solid #222;margin:1.5rem 0}
table{width:100%;border-collapse:collapse;margin-bottom:1rem}
th{color:#fff;text-align:left;padding:.25rem .5rem;border-bottom:1px solid #333;font-weight:400}
td{padding:.25rem .5rem;border-bottom:1px solid #111}
tr:hover{background:#0a0a0a}
.tag{color:#555;font-size:12px}
.cmd{color:#fff}
.footer{color:#333;margin-top:2rem;font-size:12px}
input,button{background:#111;color:#aaa;border:1px solid #222;font-family:monospace;font-size:14px;padding:.25rem .5rem;outline:none}
input:focus{border-color:#444;color:#fff}
button{cursor:pointer;color:#fff}
button:hover{background:#222}
#output{margin-top:1rem;color:#555;white-space:pre-wrap}
</style>
</head>
<body>
<h1>updSH package registry</h1>
<p>raw package repository for <a href="https://github.com/homu/updsh">updSH</a> shell.</p>
<p class="cmd">pkg install &lt;name&gt;</p>
<hr>

<h2>search</h2>
<input type="text" id="search" placeholder="search packages..." oninput="filter()">
<hr>

<h2>packages</h2>
<table id="pkglist">
<thead><tr><th>name</th><th>version</th><th>description</th><th>type</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<hr>
<h2>raw api</h2>
<pre>
GET /api/registry          -> all packages (JSON)
GET /api/pkg/&lt;name&gt;       -> single package (JSON)
</pre>

<div id="output"></div>

<div class="footer">
updSH registry &mdash; <span id="count"></span> packages
</div>

<script>
let pkgs = [];

fetch('/api/registry')
  .then(r => r.json())
  .then(data => { pkgs = data; render(data); document.getElementById('count').textContent = data.length; })
  .catch(e => document.getElementById('output').textContent = 'error: ' + e.message);

function render(list) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#333">no packages found</td></tr>';
    return;
  }
  for (const p of list) {
    const tr = document.createElement('tr');
    const name = p.type === 'compile'
      ? '<a href="/api/pkg/' + p.name + '">' + p.name + '</a>'
      : '<a href="/api/pkg/' + p.name + '">' + p.name + '</a>';
    tr.innerHTML = '<td>' + name + '</td>'
      + '<td class="tag">' + p.version + '</td>'
      + '<td>' + p.description + '</td>'
      + '<td class="tag">' + (p.language || p.type) + '</td>';
    tbody.appendChild(tr);
  }
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q ? pkgs.filter(p => p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q)) : pkgs;
  render(filtered);
}
</script>
</body>
</html>
